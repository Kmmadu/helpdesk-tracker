<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Helpdesk Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-headset"></i>
                <span>NOC Helpdesk</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="tickets">
                    <i class="fas fa-ticket-alt"></i>
                    <span>Tickets</span>
                </a>
                <a href="#" class="nav-item" data-page="knowledge">
                    <i class="fas fa-book"></i>
                    <span>Knowledge Base</span>
                </a>
                <a href="#" class="nav-item" data-page="new-ticket">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Ticket</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Dashboard</h1>
                <div class="user-info">
                    <span class="status-indicator">🟢 Online</span>
                    <span class="user-name">Network Admin</span>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Dynamic content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Modal for ticket details -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/tickets.js"></script>
    <script src="js/knowledge.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
