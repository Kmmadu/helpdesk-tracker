<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOC Helpdesk Tracker</title>
    
    <!-- Google Fonts - Professional options -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Favicon - Headset Icon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234a9eff'><path d='M12 1C7.03 1 3 5.03 3 10v4c0 2.76 2.24 5 5 5h1v-6H8c-1.66 0-3-1.34-3-3v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1c0 1.66-1.34 3-3 3h-1v6h1c2.76 0 5-2.24 5-5v-4c0-4.97-4.03-9-9-9z'/></svg>">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <!-- Hamburger Menu Toggle Button -->
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-headset"></i>
                </div>
                <div>
                    <span>NOC Helpdesk</span>
                    <div class="logo-status">
                        <span class="dot"></span>
                        Support Active
                    </div>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="tickets">
                    <i class="fas fa-ticket-alt"></i>
                    <span>Tickets</span>
                </a>
                <a href="#" class="nav-item" data-page="knowledge">
                    <i class="fas fa-book"></i>
                    <span>Knowledge Base</span>
                </a>
                <a href="#" class="nav-item" data-page="new-ticket">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Ticket</span>
                </a>
                <a href="#" class="nav-item" data-page="admin">
                    <i class="fas fa-cog"></i>
                    <span>Admin Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Dashboard</h1>
                <div class="user-info">
                    <span class="user-name">Network Admin</span>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Dynamic content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Modal for ticket details -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/api.js?v=2"></script>
    <script src="js/dashboard.js?v=2"></script>
    <script src="js/tickets.js?v=2"></script>
    <script src="js/knowledge.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
    
    <!-- Mobile menu toggle script -->
    <script>
        // Mobile menu functionality
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const menuIcon = menuToggle.querySelector('i');
            
            function toggleMenu() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
                
                // Change icon
                if (sidebar.classList.contains('active')) {
                    menuIcon.className = 'fas fa-times';
                } else {
                    menuIcon.className = 'fas fa-bars';
                }
            }
            
            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
            
            // Close menu when a nav item is clicked (mobile)
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('active');
                        overlay.classList.remove('active');
                        document.body.style.overflow = '';
                        menuIcon.className = 'fas fa-bars';
                    }
                });
            });
            
            // Close menu on window resize to desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                    menuIcon.className = 'fas fa-bars';
                }
            });
        });
    </script>
</body>
</html>
